<!DOCTYPE html>
<html>
<head>
    <title>Interactive Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Interactive Quiz App</h1>

    <div class="quiz-box">
        <h2 id="question">Question</h2>

        <button class="option" onclick="checkAnswer(this)">HTML</button>
        <button class="option" onclick="checkAnswer(this)">CSS</button>
        <button class="option" onclick="checkAnswer(this)">JavaScript</button>
        <button class="option" onclick="checkAnswer(this)">Python</button>

        <h3 id="result"></h3>
        <button id="nextBtn">Next Question</button>
    </div>

    <div class="api-box">
        <h2>Random Joke Generator</h2>
        <p id="joke">Click button to get a joke</p>
        <button onclick="getJoke()">Get Joke</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
